version: '3.8'
services:
  proxyrasp:
    build: .
    image: proxyrasp:latest
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  postgresql:
    image: postgres:18-alpine
    container_name: postgresql
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: rasp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - db-data:/var/lib/postgresql

volumes:
  db-data: